<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crow Knight</title>
    <link rel="stylesheet" href="./src/sidePanels.css" />
    <link rel="stylesheet" href="./src/rankingScreens.css" />
    <link rel="stylesheet" href="./src/settingsPanel.css" />
    <link rel="stylesheet" href="./src/settingsTimeline.css" />
    <link rel="stylesheet" href="./src/settingsScrubControls.css" />
    <link rel="stylesheet" href="./src/partPicker.css" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body class="game-home full-stage">
    <main class="app-shell">
      <section class="stage-wrap player-stage" aria-label="게임 화면">
        <canvas id="game" width="960" height="540"></canvas>

        <div class="run-hud" aria-label="플레이 기록">
          <div class="run-hud-item" aria-label="생존 시간">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8"></circle>
              <path d="M12 7v5l3 2"></path>
            </svg>
            <span id="hudSurvivalTime">0:00</span>
          </div>
          <div class="run-hud-item" aria-label="처치 수">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M12 3c-4 0-7 2.8-7 6.8 0 2.4 1.2 4.4 3 5.6V20h8v-4.6c1.8-1.2 3-3.2 3-5.6C19 5.8 16 3 12 3z"
              ></path>
              <circle class="skull-eye" cx="9.2" cy="10.4" r="1.2"></circle>
              <circle class="skull-eye" cx="14.8" cy="10.4" r="1.2"></circle>
              <path d="M11 14h2"></path>
              <path d="M9.5 17v3"></path>
              <path d="M12 17v3"></path>
              <path d="M14.5 17v3"></path>
            </svg>
            <span id="hudKills">0</span>
          </div>
        </div>

        <div id="startScreen" class="start-screen">
          <div class="start-copy">
            <p class="eyebrow">Puppet Action Beta</p>
            <h1>Crow Knight</h1>
          </div>
          <button id="homeStart" class="primary-start" type="button">게임 시작</button>
        </div>

        <div id="resultScreen" class="result-screen" hidden>
          <section class="ranking-board" aria-labelledby="rankingTitle">
            <h2 id="rankingTitle">랭킹</h2>
            <ol id="rankingList" class="ranking-list"></ol>
          </section>

          <section class="score-register" aria-labelledby="scoreTitle">
            <p class="eyebrow">Run Complete</p>
            <h2 id="scoreTitle">획득 점수</h2>
            <dl class="score-details">
              <div>
                <dt>총점</dt>
                <dd id="resultScore">0</dd>
              </div>
              <div>
                <dt>생존</dt>
                <dd id="resultSurvival">0:00</dd>
              </div>
              <div>
                <dt>처치</dt>
                <dd id="resultKills">0</dd>
              </div>
            </dl>
            <form id="rankingForm" class="ranking-form">
              <label>
                <span>이름</span>
                <input id="rankingName" type="text" maxlength="12" autocomplete="name" required />
              </label>
              <label>
                <span>메시지</span>
                <textarea id="rankingMessage" maxlength="48" rows="2"></textarea>
              </label>
              <button type="submit">랭킹등록하기</button>
            </form>
          </section>

          <nav class="result-actions" aria-label="결과 메뉴">
            <button id="retryRun" class="icon-action" type="button" aria-label="다시하기">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 3-6.7"></path>
                <path d="M3 4v6h6"></path>
              </svg>
            </button>
            <a
              class="icon-action lezhin-action"
              href="https://www.lezhin.com/ko/comic/crowknight"
              target="_blank"
              rel="noreferrer"
              aria-label="까마귀기사 보러가기"
            >
              <img src="./assets/icons/lezhin.svg" alt="" />
            </a>
            <a
              class="icon-action"
              href="https://www.instagram.com/govy9807"
              target="_blank"
              rel="noreferrer"
              aria-label="인스타그램"
            >
              <img src="./assets/icons/instagram.svg" alt="" />
            </a>
            <a class="icon-action" href="https://x.com/govy9807" target="_blank" rel="noreferrer" aria-label="트위터 X">
              <img src="./assets/icons/x.svg" alt="" />
            </a>
          </nav>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
